<style>
:root {
  --paper: #f4efe6;
  --paper-dark: #ebe3d3;
  --ink: #1a1815;
  --ink-soft: #4a4540;
  --accent: #b8341a;
  --accent-dark: #8b2512;
  --gold: #b8924a;
  --rule: #1a1815;
  --muted: #7d7670;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Fraunces', 'Times New Roman', serif;
  font-optical-sizing: auto;
  min-height: 100vh;
  line-height: 1.55;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(26, 24, 21, 0.04) 31px, rgba(26, 24, 21, 0.04) 32px);
}

.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 32px 80px;
}

/* === HEADER === */
.masthead {
  border-top: 3px double var(--rule);
  border-bottom: 3px double var(--rule);
  padding: 24px 0 20px;
  margin-bottom: 32px;
  text-align: center;
  position: relative;
}
.masthead::before, .masthead::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: var(--rule);
}
.masthead::before { top: 8px; }
.masthead::after { bottom: 8px; }

.eyebrow {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 12px;
}
.eyebrow .dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  margin: 0 14px;
  vertical-align: middle;
}

h1.title {
  font-weight: 900;
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1.02;
  letter-spacing: -0.02em;
  font-variation-settings: "opsz" 144;
  margin-bottom: 8px;
}
h1.title em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}

.subtitle {
  font-size: 14px;
  font-style: italic;
  color: var(--ink-soft);
  max-width: 620px;
  margin: 0 auto;
}

/* === CATEGORY GRID === */
.category-section {
  margin-bottom: 40px;
}

.section-label {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
  opacity: 0.3;
}

.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 2px;
  background: var(--rule);
  border: 2px solid var(--rule);
}

.cat-card {
  background: var(--paper);
  padding: 24px 22px 20px;
  cursor: pointer;
  transition: background 0.18s ease;
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 180px;
}
.cat-card:hover {
  background: var(--paper-dark);
}
.cat-card.active {
  background: var(--ink);
  color: var(--paper);
}
.cat-card.active .cat-num,
.cat-card.active .cat-meta {
  color: var(--gold);
}

.cat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 14px;
}

.cat-title {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
  font-variation-settings: "opsz" 48;
}

.cat-desc {
  font-size: 13px;
  line-height: 1.45;
  color: inherit;
  opacity: 0.78;
  font-style: italic;
  flex: 1;
}

.cat-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--ink-soft);
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px dotted currentColor;
}

/* === CONTROL BAR === */
.control-bar {
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 20px 24px;
  background: var(--ink);
  color: var(--paper);
  margin-bottom: 0;
  flex-wrap: wrap;
}
.control-bar.show { display: flex; }

.control-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
}
.control-title {
  font-size: 20px;
  font-weight: 700;
  flex: 1;
  min-width: 200px;
}

.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 11px 20px;
  border: 1px solid var(--paper);
  background: transparent;
  color: var(--paper);
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}
.btn:hover {
  background: var(--paper);
  color: var(--ink);
}
.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--paper);
}
.btn-accent:hover {
  background: var(--accent-dark);
  border-color: var(--accent-dark);
  color: var(--paper);
}

/* === EXERCISE CONTAINER === */
.exercise-wrap {
  display: none;
  background: #fffdf7;
  border: 2px solid var(--rule);
  border-top: none;
  padding: 0;
  box-shadow: 8px 8px 0 rgba(26, 24, 21, 0.08);
}
.exercise-wrap.show { display: block; }

.exam-header {
  padding: 28px 40px 16px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper-dark);
}
.exam-header-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.exam-header h2 {
  font-size: 18px;
  font-weight: 700;
  font-style: italic;
}

.exercise-body {
  padding: 40px 48px 48px;
}

.ex-num {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.25em;
  padding: 6px 12px;
  background: var(--ink);
  color: var(--gold);
  margin-bottom: 18px;
}

.ex-points {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--accent);
  margin-left: 12px;
  font-weight: 700;
}

.statement {
  font-size: 16px;
  line-height: 1.7;
  margin-bottom: 24px;
}
.statement p { margin-bottom: 14px; }

.parts {
  list-style: none;
  counter-reset: part;
  border-left: 3px solid var(--accent);
  padding: 12px 0 12px 22px;
  margin: 24px 0;
  background: rgba(184, 52, 26, 0.03);
}
.parts li {
  counter-increment: part;
  margin-bottom: 14px;
  font-size: 15px;
  line-height: 1.55;
}
.parts li:last-child { margin-bottom: 0; }
.parts li::before {
  content: "(" counter(part, lower-alpha) ") ";
  font-weight: 700;
  font-style: italic;
  color: var(--accent);
}
.parts li .pts {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
}

/* === SOLUTION === */
.sol-toggle {
  width: 100%;
  padding: 16px 24px;
  background: var(--paper-dark);
  border: 1px dashed var(--rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--ink);
  margin-top: 32px;
  transition: all 0.15s;
  font-weight: 500;
}
.sol-toggle:hover {
  background: var(--ink);
  color: var(--gold);
  border-style: solid;
}
.sol-toggle .arrow {
  color: var(--accent);
  margin-right: 8px;
}

.solution {
  display: none;
  margin-top: 20px;
  padding: 32px 36px;
  background: #fffdf7;
  border: 1px solid var(--rule);
  border-left: 4px solid var(--gold);
  position: relative;
}
.solution.show { display: block; }
.solution::before {
  content: 'SOLUCIГ“N';
  position: absolute;
  top: -10px;
  left: 24px;
  background: #fffdf7;
  padding: 0 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--gold);
  font-weight: 700;
}

.sol-step {
  margin-bottom: 22px;
}
.sol-step h4 {
  font-size: 14px;
  font-weight: 700;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 8px;
  padding-left: 14px;
  border-left: 2px solid var(--accent);
}
.sol-step p, .sol-step div { margin-bottom: 10px; line-height: 1.65; }

.result-box {
  background: var(--paper-dark);
  border: 2px solid var(--ink);
  padding: 14px 20px;
  margin: 14px 0;
  font-size: 15px;
}

.mono { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }

/* === FOOTER === */
.footer-note {
  margin-top: 48px;
  padding-top: 20px;
  border-top: 1px solid var(--rule);
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}
.footer-note .ornament {
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 0.5em;
  margin-bottom: 8px;
}

/* Scroll */
html { scroll-behavior: smooth; }

@media (max-width: 640px) {
  .page { padding: 24px 16px 60px; }
  .exercise-body { padding: 28px 22px; }
  .exam-header { padding: 20px 22px 14px; }
  .cat-grid { grid-template-columns: 1fr; }
  .control-bar { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <div class="eyebrow">Universidad de Navarra<span class="dot"></span>School of Economics<span class="dot"></span>2025/26</div>
    <h1 class="title">MГ©todos Cuantitativos <em>II</em></h1>
    <div class="subtitle">Generador interactivo de ejercicios de examen вЂ” bordered Hessians, Kuhn-Tucker, Markov chains y mГЎs.</div>
  </header>

  <section class="category-section">
    <div class="section-label">Elige un tipo de ejercicio</div>
    <div class="cat-grid" id="catGrid">
