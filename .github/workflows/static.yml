        <div class="cat-desc">Matrices 3Г—3 y 4Г—4. DiscusiГіn por RouchГ©-Frobenius, Gauss-Jordan.</div>
        <div class="cat-meta">3.0 вЂ” 4.0 pts</div>
      </div>
