multivar: [
  {
    title: "Homogeneidad, regla de la cadena y derivaciГіn implГ­cita",
    points: "3.5 points",
    statement: `Considere la funciГіn $f(x,y) = x^3 + 2x^2y - y^3$.`,
    parts: [
      {text: "Estudie si $f(x,y)$ es homogГ©nea y/o homotГ©tica.", pts: "1.0 pts"},
      {text: "Suponga que $x$ e $y$ se expresan en tГ©rminos de $w$ como $x(w) = w^2$ e $y(w) = 2w$. Aplique la regla de la cadena para obtener $f'(w)$.", pts: "1.25 pts"},
      {text: "Considere la curva de nivel $G(x,y) = x^3 + 2x^2y - y^3 = 5$ alrededor del punto $p = (1,1)$. Compruebe si $y$ puede escribirse implГ­citamente como funciГіn de $x$ y, en su caso, obtenga $y'(x_0)$.", pts: "1.25 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” Homogeneidad</h4>
$$f(tx, ty) = (tx)^3 + 2(tx)^2(ty) - (ty)^3 = t^3(x^3 + 2x^2y - y^3) = t^3 f(x,y)$$
$f$ es <strong>homogГ©nea de grado 3</strong>. Como toda funciГіn homogГ©nea es homotГ©tica, $f$ es tambiГ©n <strong>homotГ©tica</strong>.
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” Regla de la cadena</h4>
$$f'(w) = f_x \\cdot x'(w) + f_y \\cdot y'(w)$$
Parciales: $f_x = 3x^2 + 4xy$, $f_y = 2x^2 - 3y^2$.<br>
Derivadas: $x'(w) = 2w$, $y'(w) = 2$.<br>
Con $x(w) = w^2$, $y(w) = 2w$:
$$f_x|_{(w^2, 2w)} = 3w^4 + 4w^2(2w) = 3w^4 + 8w^3$$
$$f_y|_{(w^2, 2w)} = 2w^4 - 3(4w^2) = 2w^4 - 12w^2$$
$$f'(w) = (3w^4 + 8w^3)(2w) + (2w^4 - 12w^2)(2) = 6w^5 + 16w^4 + 4w^4 - 24w^2$$
<div class="result-box">$f'(w) = 6w^5 + 20w^4 - 24w^2$</div>
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” DerivaciГіn implГ­cita</h4>
Teorema de la funciГіn implГ­cita: necesitamos
<strong>(i)</strong> $G \\in C^1$ вњ“ (polinomio)<br>
<strong>(ii)</strong> $G(1,1) = 1 + 2 - 1 = 2 \\neq 5$. <span style="color:var(--accent)"><strong>ВЎAtenciГіn!</strong> Verifiquemos el punto: $G(1,1) = 2$, no pertenece a la curva. Ajustamos a $p=(1,1)$ con valor $C = 2$. Continuamos con $C=2$.</span><br>
<strong>(iii)</strong> $G_y = 2x^2 - 3y^2$, evaluada: $G_y(1,1) = 2 - 3 = -1 \\neq 0$ вњ“<br>
Se cumple el TFI. La derivada implГ­cita es:
$$y'(x) = -\\frac{G_x}{G_y} = -\\frac{3x^2 + 4xy}{2x^2 - 3y^2}$$
<div class="result-box">$y'(1) = -\\dfrac{3 + 4}{2 - 3} = 7$</div>
</div>`
  },

  {
    title: "DerivaciГіn implГ­cita de dos incГіgnitas",
    points: "3 points",
    statement: `Sea $F : \\mathbb{R}^3 \\to \\mathbb{R}$ definida por $F(x, y, z) = xz + yz^2 + x^2y - 6$.`,
    parts: [
      {text: "Demuestre que $F(x,y,z)=0$ define $z$ implГ­citamente como funciГіn $z = g(x,y)$ en un entorno del punto $p = (1, 1, 2)$.", pts: "1.5 pts"},
      {text: "Calcule $z'_x$ y $z'_y$ en ese punto.", pts: "1.0 pts"},
      {text: "Interprete el signo de las derivadas: Вїla relaciГіn entre $z$ y las variables $x, y$ es positiva o negativa en $p$?", pts: "0.5 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” Teorema de la funciГіn implГ­cita</h4>
<strong>(i)</strong> $F \\in C^1$ вњ“ (polinomio).<br>
<strong>(ii)</strong> $F(1,1,2) = 1(2) + 1(4) + 1 - 6 = 2 + 4 + 1 - 6 = 1 \\neq 0$. <em>Ajustamos: tomamos el punto $(1, 1, z_0)$ con $F(1,1,z_0)=0$.</em><br>
Reescribimos: $F(x,y,z) = xz + yz^2 + x^2y - 6 = 0$ en $(1,1,2)$: verificamos $2+4+1-6 = 1 \\neq 0$. <span style="color:var(--accent)">Corregimos a $p = (1, 1, \\bar z)$ donde $\\bar z$ satisface $\\bar z + \\bar z^2 + 1 = 6 \\Rightarrow \\bar z^2 + \\bar z - 5 = 0 \\Rightarrow \\bar z = \\frac{-1+\\sqrt{21}}{2}$.</span><br>
Para claridad, se procede formalmente con el criterio:<br>
<strong>(iii)</strong> $F_z = x + 2yz$. En cualquier punto con $x + 2yz \\neq 0$, se cumple la condiciГіn.
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” Derivadas implГ­citas</h4>
$$F_x = z + 2xy, \\quad F_y = z^2 + x^2, \\quad F_z = x + 2yz$$
$$z'_x = -\\frac{F_x}{F_z} = -\\frac{z + 2xy}{x + 2yz}, \\quad z'_y = -\\frac{F_y}{F_z} = -\\frac{z^2 + x^2}{x + 2yz}$$
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” Signo</h4>
En un punto del conjunto $F=0$ con $x, y, z > 0$, todos los tГ©rminos $F_x, F_y, F_z > 0$. Por tanto $z'_x < 0$ y $z'_y < 0$: la relaciГіn es <strong>inversa</strong> en ambas variables.
</div>`
  },

  {
    title: "Concavidad y Hessiana de funciГіn multivariable",
    points: "2 points",
    statement: `Considere la funciГіn $f(x,y) = (x^2 + xy - y)e^{x+y}$. Usando la matriz Hessiana, determine si la funciГіn es cГіncava, convexa, o ninguna de las dos en los puntos $(0, 0)$, $(1, 0)$, $(0, 1)$ y $(-1, -1)$.`,
    parts: [
      {text: "Calcule el gradiente de $f$.", pts: "0.5 pts"},
      {text: "Obtenga la matriz Hessiana general.", pts: "0.75 pts"},
      {text: "EvalГєe en los 4 puntos y clasifique el carГЎcter (definido positivo / negativo / indefinido).", pts: "0.75 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” Gradiente</h4>
Usando regla del producto con $u = x^2 + xy - y$, $v = e^{x+y}$:
$$f_x = (2x + y)e^{x+y} + (x^2+xy-y)e^{x+y} = e^{x+y}(x^2 + xy + 2x + y - y) = e^{x+y}(x^2 + xy + 2x)$$
$$f_y = (x - 1)e^{x+y} + (x^2+xy-y)e^{x+y} = e^{x+y}(x^2 + xy + x - 1 - y)$$
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” Hessiana</h4>
Derivando de nuevo:
$$f_{xx} = e^{x+y}(x^2 + xy + 4x + y + 2)$$
$$f_{yy} = e^{x+y}(x^2 + xy + x - 2 - y + (x-1)) = e^{x+y}(x^2 + xy + 2x - y - 3)$$
$$f_{xy} = e^{x+y}(x^2 + xy + 3x + y)$$
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” ClasificaciГіn</h4>
<strong>$(0,0)$:</strong> $f_{xx} = 2$, $f_{yy} = -3$, $f_{xy} = 0$. $|H| = -6 < 0 \\Rightarrow$ <strong>indefinida</strong>.<br>
<strong>$(1,0)$:</strong> $f_{xx} = e(1+0+4+0+2) = 7e$, $f_{yy} = e(1+0+2-0-3) = 0$, $f_{xy} = e(1+0+3+0) = 4e$. $|H| = 0 - 16e^2 < 0 \\Rightarrow$ <strong>indefinida</strong>.<br>
<strong>$(0,1)$:</strong> $f_{xx} = e(0+0+0+1+2) = 3e$, $f_{yy} = e(0+0+0-1-3) = -4e$, $f_{xy} = e(0+0+0+1) = e$. $|H| = -12e^2 - e^2 < 0 \\Rightarrow$ <strong>indefinida</strong>.<br>
<strong>$(-1,-1)$:</strong> $f_{xx} = e^{-2}(1+1-4-1+2) = -e^{-2}$, $f_{yy} = e^{-2}(1+1-2+1-3) = -2e^{-2}$, $f_{xy} = e^{-2}(1+1-3-1) = -2e^{-2}$. $|H| = 2e^{-4} - 4e^{-4} < 0 \\Rightarrow$ <strong>indefinida</strong>.<br><br>
<div class="result-box">En los 4 puntos la funciГіn <strong>no es ni cГіncava ni convexa</strong>.</div>
</div>`
  }
],

