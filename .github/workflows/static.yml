ineq: [
  {
    title: "Kuhn-Tucker con desigualdad lineal",
    points: "3 points",
    statement: `Resuelva, mediante el mГ©todo de Kuhn-Tucker:
    <p>$$\\max_{x,y} \\; -(x-2)^2 - (y-3)^2 \\quad \\text{sujeto a} \\quad x + y \\le 4$$</p>`,
    parts: [
      {text: "Escriba la Lagrangiana y las condiciones de Kuhn-Tucker.", pts: "0.75 pts"},
      {text: "Analice los casos con la restricciГіn activa y no activa.", pts: "1.5 pts"},
      {text: "Verifique con la Hessiana orlada que el candidato es mГЎximo.", pts: "0.75 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” Lagrangiana y KT</h4>
$$\\mathcal{L}(x,y,\\lambda) = -(x-2)^2 - (y-3)^2 - \\lambda(x + y - 4)$$
$$\\frac{\\partial \\mathcal{L}}{\\partial x} = -2(x-2) - \\lambda = 0$$
$$\\frac{\\partial \\mathcal{L}}{\\partial y} = -2(y-3) - \\lambda = 0$$
$$\\lambda \\ge 0, \\quad \\lambda(x+y-4) = 0, \\quad x+y \\le 4$$
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” Casos</h4>
<strong>Caso A вЂ” No activa ($\\lambda=0$):</strong> $-2(x-2)=0 \\Rightarrow x=2$; $y=3$. Pero $2+3=5 > 4$: <em>no cumple</em> la restricciГіn. <strong>Descartado.</strong><br><br>

<strong>Caso B вЂ” Activa ($x+y=4$):</strong> De las dos primeras ecuaciones, $-2(x-2) = -2(y-3) \\Rightarrow x - 2 = y - 3 \\Rightarrow y = x + 1$.<br>
Con $x + y = 4$: $2x + 1 = 4 \\Rightarrow x = 3/2$, $y = 5/2$.<br>
$\\lambda = -2(3/2 - 2) = 1 \\ge 0$ вњ“
<div class="result-box">$x^* = 3/2, \\quad y^* = 5/2, \\quad \\lambda^* = 1$</div>
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” Hessiana orlada</h4>
$$B = \\begin{pmatrix} 0 & 1 & 1 \\\\ 1 & -2 & 0 \\\\ 1 & 0 & -2 \\end{pmatrix}$$
$|B| = 0 \\cdot (\\cdots) - 1 \\cdot (-2 - 0) + 1 \\cdot (0 + 2) = 2 + 2 = 4 > 0 \\Rightarrow$ <strong>mГЎximo</strong>.<br>
(AdemГЎs, la funciГіn objetivo es globalmente cГіncava).
</div>`
  },

  {
    title: "AsignaciГіn de recursos con cota",
    points: "3 points",
    statement: `Una empresa extrae dos minerales en cantidades $x_1, x_2 \\ge 0$. Los ingresos son $\\sqrt{x_1} + 2\\sqrt{x_2}$. La cota de horas diarias es $x_1 + x_2 \\le 18$.`,
    parts: [
      {text: "Escriba la Lagrangiana con Kuhn-Tucker incluyendo las restricciones de no negatividad.", pts: "0.5 pts"},
      {text: "Resuelva y encuentre $x_1^*, x_2^*, \\lambda^*$.", pts: "1.5 pts"},
      {text: "Interprete econГіmicamente el multiplicador y calcule el impacto aproximado sobre los ingresos si la cota pasara de 18 a 19 horas.", pts: "1.0 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a)</h4>
$$\\mathcal{L} = \\sqrt{x_1} + 2\\sqrt{x_2} - \\lambda(x_1 + x_2 - 18) - \\mu_1(-x_1) - \\mu_2(-x_2)$$
Condiciones KT:
$$\\frac{1}{2\\sqrt{x_1}} - \\lambda \\le 0, \\; = 0 \\text{ si } x_1 > 0$$
$$\\frac{1}{\\sqrt{x_2}} - \\lambda \\le 0, \\; = 0 \\text{ si } x_2 > 0$$
$$\\lambda \\ge 0, \\quad \\lambda(x_1 + x_2 - 18) = 0, \\quad x_1 + x_2 \\le 18$$
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” ResoluciГіn</h4>
Si $x_1 = 0$ $\\Rightarrow$ el coeficiente $\\frac{1}{2\\sqrt{x_1}} \\to \\infty$, imposible que sea $\\le \\lambda$. Descartado. AnГЎlogamente $x_2 > 0$.<br><br>

Si $\\lambda = 0$: imposible (mismo argumento). Por tanto la restricciГіn activa: $x_1 + x_2 = 18$.<br><br>

De las igualdades: $\\frac{1}{2\\sqrt{x_1}} = \\frac{1}{\\sqrt{x_2}} \\Rightarrow \\sqrt{x_2} = 2\\sqrt{x_1} \\Rightarrow x_2 = 4x_1$.<br>
Con $x_1 + x_2 = 18$: $5x_1 = 18 \\Rightarrow x_1^* = 18/5$, $x_2^* = 72/5$.<br>
$\\lambda^* = \\frac{1}{2\\sqrt{18/5}} = \\frac{1}{2}\\sqrt{\\frac{5}{18}} = \\frac{\\sqrt{5}}{2\\sqrt{18}} = \\frac{\\sqrt{10}}{12}$.
<div class="result-box">$x_1^* = 18/5, \\; x_2^* = 72/5, \\; \\lambda^* = \\sqrt{10}/12 \\approx 0.2635$</div>
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” InterpretaciГіn</h4>
$\\lambda^*$ es el <strong>precio sombra</strong> del recurso В«horasВ». Una hora adicional incrementa los ingresos aproximadamente en $\\lambda^* \\approx 0.2635$ unidades monetarias (Teorema de la Envolvente).<br>
Por tanto, pasar de 18 a 19 horas aГ±ade $\\approx 0.26$ в‚¬.
</div>`
  },

  {
    title: "Monopolio con capacidad limitada",
    points: "3 points",
    statement: `Una empresa vende en dos mercados. En el mercado 1 es monopolista con demanda $p_1 = 80 - q_1$. En el mercado 2 es precio-aceptante con precio $p_2 = 20$. Tiene capacidad $k$ (no puede producir mГЎs de $k$ unidades en total) y coste marginal cero.`,
    parts: [
      {text: "Plantee el problema con Kuhn-Tucker.", pts: "0.5 pts"},
      {text: "Resuelva el problema si $k = 20$.", pts: "1.25 pts"},
      {text: "Resuelva el problema si $k = 50$.", pts: "1.25 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” Planteamiento</h4>
Ingresos: $I = (80 - q_1)q_1 + 20 q_2$. Coste 0.<br>
$$\\mathcal{L} = (80-q_1)q_1 + 20q_2 - \\lambda(q_1 + q_2 - k) - \\mu_1(-q_1) - \\mu_2(-q_2)$$
KT:
$$80 - 2q_1 - \\lambda \\le 0, \\; = 0 \\text{ si } q_1 > 0$$
$$20 - \\lambda \\le 0, \\; = 0 \\text{ si } q_2 > 0$$
$$\\lambda \\ge 0, \\quad \\lambda(q_1 + q_2 - k) = 0$$
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” Caso $k = 20$</h4>
Como $p_2 = 20 > 0$, la restricciГіn serГЎ activa ($q_1 + q_2 = 20$).<br><br>

<strong>HipГіtesis $q_1 > 0, q_2 > 0$:</strong> $80 - 2q_1 = \\lambda = 20 \\Rightarrow q_1 = 30$. Pero $q_1 + q_2 = 20$ con $q_2 \\ge 0$ $\\Rightarrow q_1 \\le 20$. <strong>ContradicciГіn.</strong><br><br>

<strong>HipГіtesis $q_2 = 0$, $q_1 = 20$:</strong> $\\lambda = 80 - 40 = 40$. Comprobamos $20 - \\lambda = -20 \\le 0$ вњ“.
<div class="result-box">$q_1^* = 20, \\; q_2^* = 0, \\; \\lambda^* = 40$</div>
InterpretaciГіn: la capacidad es tan baja que toda se dedica al mercado monopolista.
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” Caso $k = 50$</h4>
<strong>HipГіtesis $q_1, q_2 > 0$:</strong> $\\lambda = 20$, $q_1 = 30$. Entonces $q_2 = 50 - 30 = 20 > 0$ вњ“.<br>
Comprobamos: $80 - 60 - 20 = 0$ вњ“.
<div class="result-box">$q_1^* = 30, \\; q_2^* = 20, \\; \\lambda^* = 20$</div>
Ahora sobra capacidad respecto del caso anterior; el monopolista fija $q_1$ al Гіptimo de ingreso marginal = precio mercado 2.
</div>`
  }
]

};

// ============================================================
// RENDER LOGIC
// ============================================================

const CATEGORY_META = {
  systems:  {label: "I В· ГЃlgebra lineal", title: "Sistemas de ecuaciones con parГЎmetros"},
  markov:   {label: "I В· ГЃlgebra lineal", title: "Cadenas de Markov diagonalizables"},
  multivar: {label: "II В· CГЎlculo",        title: "Funciones multivariable"},
  uncon:    {label: "III В· OptimizaciГіn",  title: "OptimizaciГіn sin restricciones"},
  eq:       {label: "IV В· OptimizaciГіn",   title: "OptimizaciГіn con restricciГіn de igualdad"},
  ineq:     {label: "V В· OptimizaciГіn",    title: "OptimizaciГіn con restricciГіn de desigualdad"}
};

let currentCategory = null;
let currentExerciseIndex = 0;

function renderExercise(catKey, idx) {
  const ex = EXERCISES[catKey][idx];
  const meta = CATEGORY_META[catKey];

  document.getElementById('ctrlLabel').textContent = meta.label;
  document.getElementById('ctrlTitle').textContent = meta.title;
  document.getElementById('examTitle').textContent = meta.title;
  document.getElementById('examStamp').textContent = `Ejercicio ${idx+1} / ${EXERCISES[catKey].length}`;

  const body = document.getElementById('exBody');

  const partsHTML = ex.parts.map(p => `<li>${p.text} <span class="pts">[${p.pts}]</span></li>`).join('');

  body.innerHTML = `
    <div>
      <span class="ex-num">Ejercicio</span>
      <span class="ex-points">(${ex.points})</span>
    </div>
    <h3 style="font-size:24px; font-weight:700; margin:12px 0 18px; line-height:1.2;">${ex.title}</h3>
    <div class="statement">${ex.statement}</div>
    <ol class="parts">${partsHTML}</ol>
    <button class="sol-toggle" onclick="toggleSolution(this)"><span class="arrow">в–ё</span> Ver soluciГіn paso a paso</button>
    <div class="solution">${ex.solution}</div>
  `;

  // Re-render MathJax
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([body]).catch(e => console.error(e));
  }

  document.getElementById('controlBar').classList.add('show');
  document.getElementById('exWrap').classList.add('show');

  // Scroll into view on mobile
  setTimeout(() => {
    document.getElementById('controlBar').scrollIntoView({behavior: 'smooth', block: 'start'});
  }, 50);
}

function toggleSolution(btn) {
  const sol = btn.nextElementSibling;
  sol.classList.toggle('show');
  btn.innerHTML = sol.classList.contains('show')
    ? '<span class="arrow">в–ѕ</span> Ocultar soluciГіn'
    : '<span class="arrow">в–ё</span> Ver soluciГіn paso a paso';
}

function pickNewExercise(catKey) {
  const pool = EXERCISES[catKey];
  let idx;
  if (pool.length === 1) idx = 0;
  else {
    do { idx = Math.floor(Math.random() * pool.length); }
    while (idx === currentExerciseIndex);
  }
  currentExerciseIndex = idx;
  currentCategory = catKey;
  renderExercise(catKey, idx);
}

// Event listeners
document.querySelectorAll('.cat-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    const cat = card.getAttribute('data-cat');
    currentCategory = cat;
    currentExerciseIndex = -1;
    pickNewExercise(cat);
  });
});

document.getElementById('newBtn').addEventListener('click', () => {
  if (currentCategory) pickNewExercise(currentCategory);
});

document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('controlBar').classList.remove('show');
  document.getElementById('exWrap').classList.remove('show');
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
  window.scrollTo({top: 0, behavior: 'smooth'});
});
</script>
</body>
</html>
