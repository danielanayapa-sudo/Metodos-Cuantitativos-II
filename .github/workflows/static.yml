$$\\pi = aq_1 - q_1^2 + bq_2 - 2q_2^2 - 3q_1^2 - cq_1q_2 - 3q_2^2 = aq_1 + bq_2 - 4q_1^2 - 5q_2^2 - cq_1q_2$$
