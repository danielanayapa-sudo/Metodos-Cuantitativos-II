      {text: "Use las condiciones de segundo orden para verificar que la soluciГіn es mГЎximo.", pts: "1.0 pts"},
      {text: "Construya la funciГіn de valor $\\pi^*$ y obtenga $\\partial\\pi^*/\\partial a$, $\\partial\\pi^*/\\partial b$, $\\partial\\pi^*/\\partial c$.", pts: "1.0 pts"}
