// OPTIMIZACIГ“N CON RESTRICCIГ“N DE IGUALDAD
// =============================================
eq: [
  {
    title: "MaximizaciГіn de utilidad con restricciГіn presupuestaria",
    points: "3.5 points",
    statement: `Un consumidor maximiza su utilidad $U(x_1, x_2) = \\ln(x_1) + 2\\ln(x_2)$ sujeto a la restricciГіn presupuestaria $p_1 x_1 + p_2 x_2 = m$, donde $p_1, p_2, m > 0$.`,
    parts: [
      {text: "Escriba la Lagrangiana y las condiciones de primer orden.", pts: "0.75 pts"},
      {text: "Obtenga las demandas marshalianas $x_1^*(p_1, p_2, m)$, $x_2^*(p_1, p_2, m)$ y el multiplicador $\\lambda^*$.", pts: "1.25 pts"},
      {text: "Usando la Hessiana orlada, demuestre que es un mГЎximo.", pts: "0.75 pts"},
      {text: "Obtenga la funciГіn de utilidad indirecta $V^*(p_1, p_2, m)$ y verifique $\\lambda^* = \\partial V^*/\\partial m$.", pts: "0.75 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” Lagrangiana y FOC</h4>
$$\\mathcal{L}(x_1, x_2, \\lambda) = \\ln x_1 + 2\\ln x_2 - \\lambda(p_1 x_1 + p_2 x_2 - m)$$
$$\\mathcal{L}_{x_1} = \\frac{1}{x_1} - \\lambda p_1 = 0$$
$$\\mathcal{L}_{x_2} = \\frac{2}{x_2} - \\lambda p_2 = 0$$
$$\\mathcal{L}_{\\lambda} = -(p_1 x_1 + p_2 x_2 - m) = 0$$
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” Г“ptimo</h4>
De las dos primeras: $\\lambda = \\frac{1}{p_1 x_1} = \\frac{2}{p_2 x_2} \\Rightarrow p_2 x_2 = 2 p_1 x_1$.<br>
Sustituyendo en la restricciГіn: $p_1 x_1 + 2 p_1 x_1 = m \\Rightarrow 3p_1 x_1 = m$.
<div class="result-box">$x_1^* = \\dfrac{m}{3p_1}, \\quad x_2^* = \\dfrac{2m}{3p_2}, \\quad \\lambda^* = \\dfrac{3}{m}$</div>
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” Hessiana orlada</h4>
$$B = \\begin{pmatrix} 0 & p_1 & p_2 \\\\ p_1 & -1/x_1^2 & 0 \\\\ p_2 & 0 & -2/x_2^2 \\end{pmatrix}$$
$$|B| = -p_1\\left[-\\frac{2p_1}{x_2^2}\\right] + p_2\\left[\\frac{2p_2}{x_1^2}\\right]\\cdot(-1) \\ldots$$
Desarrollando por la primera fila:
$$|B| = 0 - p_1\\left(p_1 \\cdot \\frac{-2}{x_2^2}\\right) + p_2\\left(p_2 \\cdot \\frac{1}{x_1^2}\\right) \\cdot (-1)$$

MГЎs limpio: $|B| = \\frac{2p_1^2}{x_2^2} + \\frac{p_2^2}{x_1^2} > 0$.<br>
Como $|B| > 0$ en el punto crГ­tico, es <strong>mГЎximo</strong>.
</div>

<div class="sol-step"><h4>Apartado (d) вЂ” FunciГіn de valor</h4>
$$V^*(p_1, p_2, m) = \\ln\\left(\\frac{m}{3p_1}\\right) + 2\\ln\\left(\\frac{2m}{3p_2}\\right) = 3\\ln m - \\ln(3p_1) - 2\\ln(3p_2/2)$$
$$\\frac{\\partial V^*}{\\partial m} = \\frac{3}{m} = \\lambda^* \\quad вњ“$$
</div>`
  },

  {
    title: "MinimizaciГіn de costes en producciГіn (Cobb-Douglas)",
    points: "3 points",
    statement: `Una empresa produce con tecnologГ­a $Q(K,L) = K^{1/3} L^{2/3}$. Los precios de los factores son $r$ (capital) y $w$ (trabajo). Se desea alcanzar un nivel de producciГіn $\\tilde Q$.`,
    parts: [
      {text: "Plantee el problema de minimizaciГіn de costes y su Lagrangiano.", pts: "0.5 pts"},
      {text: "Encuentre las demandas condicionadas $K^*(r,w,\\tilde Q)$, $L^*(r,w,\\tilde Q)$ y $\\lambda^*$.", pts: "1.5 pts"},
      {text: "Obtenga la funciГіn de costes $C^*(r,w,\\tilde Q)$ y verifique que $\\lambda^* = \\partial C^*/\\partial \\tilde Q$.", pts: "1.0 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” Lagrangiano</h4>
$$\\min_{K,L} \\; rK + wL \\quad \\text{s.a.} \\quad K^{1/3} L^{2/3} = \\tilde Q$$
$$\\mathcal{L}(K, L, \\lambda) = rK + wL - \\lambda(K^{1/3}L^{2/3} - \\tilde Q)$$
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” Г“ptimo</h4>
FOC:
$$\\mathcal{L}_K = r - \\lambda \\cdot \\frac{1}{3} K^{-2/3} L^{2/3} = 0$$
$$\\mathcal{L}_L = w - \\lambda \\cdot \\frac{2}{3} K^{1/3} L^{-1/3} = 0$$
Dividiendo: $\\frac{r}{w} = \\frac{(1/3)L/K}{(2/3)} = \\frac{L}{2K} \\Rightarrow L = \\frac{2rK}{w}$.<br>
Sustituyendo en la restricciГіn:
$$K^{1/3}\\left(\\frac{2rK}{w}\\right)^{2/3} = \\tilde Q \\Rightarrow K \\cdot \\left(\\frac{2r}{w}\\right)^{2/3} = \\tilde Q$$
<div class="result-box">$K^* = \\tilde Q \\left(\\dfrac{w}{2r}\\right)^{2/3}, \\quad L^* = \\tilde Q \\left(\\dfrac{2r}{w}\\right)^{1/3}$</div>

Para $\\lambda^*$: de la primera FOC, $\\lambda = 3r K^{2/3} L^{-2/3}$. Sustituyendo:
$$\\lambda^* = 3r \\left(\\frac{w}{2r}\\right)^{4/9}\\cdot \\left(\\frac{2r}{w}\\right)^{2/9}$$
Simplificando: $\\lambda^* = 3 \\cdot \\left(\\frac{r}{2}\\right)^{1/3} w^{2/3} \\cdot \\frac{1}{3} \\cdot 3 = 3^{1} \\cdot \\left(r^{1/3} (w/2)^{2/3}\\right)$. <em>Una forma compacta</em>:
<div class="result-box">$\\lambda^* = 3\\left(\\dfrac{r}{1}\\right)^{1/3}\\left(\\dfrac{w}{2}\\right)^{2/3}$ (coste marginal)</div>
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” FunciГіn de costes</h4>
$$C^*(r, w, \\tilde Q) = r K^* + w L^* = \\tilde Q \\cdot r \\left(\\frac{w}{2r}\\right)^{2/3} + \\tilde Q \\cdot w \\left(\\frac{2r}{w}\\right)^{1/3}$$
Factorizando, ambos tГ©rminos dan $\\tilde Q \\cdot (r)^{1/3}(w/2)^{2/3} \\cdot \\alpha$. Tras simplificar:
$$C^*(r, w, \\tilde Q) = 3 \\tilde Q \\cdot r^{1/3}\\left(\\frac{w}{2}\\right)^{2/3}$$
$$\\frac{\\partial C^*}{\\partial \\tilde Q} = 3 r^{1/3}\\left(\\frac{w}{2}\\right)^{2/3} = \\lambda^* \\quad вњ“$$
</div>`
  },

  {
    title: "OptimizaciГіn con restricciГіn cuadrГЎtica",
    points: "3.5 points",
    statement: `Considere el problema:
    <p>$$\\max_{x, y} \\; f(x,y) = x^2 + y^2 \\quad \\text{sujeto a} \\quad g(x,y) = 2x^2 + xy + 2y^2 - 5 = 0$$</p>`,
    parts: [
      {text: "Escriba la Lagrangiana y las condiciones de primer orden.", pts: "0.5 pts"},
      {text: "Encuentre todos los puntos crГ­ticos.", pts: "1.5 pts"},
      {text: "Usando la Hessiana orlada, clasifique cada punto crГ­tico.", pts: "1.5 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a)</h4>
$$\\mathcal{L}(x,y,\\lambda) = x^2 + y^2 - \\lambda(2x^2 + xy + 2y^2 - 5)$$
$$\\mathcal{L}_x = 2x - \\lambda(4x + y) = 0 \\quad (1)$$
$$\\mathcal{L}_y = 2y - \\lambda(x + 4y) = 0 \\quad (2)$$
$$\\mathcal{L}_\\lambda = -(2x^2 + xy + 2y^2 - 5) = 0 \\quad (3)$$
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” Puntos crГ­ticos</h4>
De (1) y (2): $\\lambda = \\frac{2x}{4x+y} = \\frac{2y}{x+4y}$.<br>
Cruzando: $2x(x+4y) = 2y(4x+y) \\Rightarrow x^2 + 4xy = 4xy + y^2 \\Rightarrow x^2 = y^2$.<br><br>

<strong>Caso 1: $y = x$.</strong> Sustituyendo en (3): $2x^2 + x^2 + 2x^2 = 5 \\Rightarrow 5x^2 = 5 \\Rightarrow x = \\pm 1$.<br>
Puntos: $(1, 1)$ y $(-1, -1)$, con $\\lambda = \\frac{2}{5}$.<br><br>

<strong>Caso 2: $y = -x$.</strong> Sustituyendo: $2x^2 - x^2 + 2x^2 = 5 \\Rightarrow 3x^2 = 5 \\Rightarrow x = \\pm\\sqrt{5/3}$.<br>
Puntos: $(\\sqrt{5/3}, -\\sqrt{5/3})$ y $(-\\sqrt{5/3}, \\sqrt{5/3})$, con $\\lambda = \\frac{2}{3}$.
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” Hessiana orlada</h4>
$$B = \\begin{pmatrix} 0 & g_x & g_y \\\\ g_x & \\mathcal{L}_{xx} & \\mathcal{L}_{xy} \\\\ g_y & \\mathcal{L}_{xy} & \\mathcal{L}_{yy} \\end{pmatrix} = \\begin{pmatrix} 0 & 4x+y & x+4y \\\\ 4x+y & 2-4\\lambda & -\\lambda \\\\ x+4y & -\\lambda & 2-4\\lambda \\end{pmatrix}$$

<strong>Puntos $(\\pm 1, \\pm 1)$, $\\lambda = 2/5$:</strong> $g_x = 5, g_y = 5$, $\\mathcal{L}_{xx} = \\mathcal{L}_{yy} = 2/5$, $\\mathcal{L}_{xy} = -2/5$.<br>
$|B| = -(5)\\left[(5)(2/5) - (-2/5)(5)\\right] + (5)\\left[(5)(-2/5) - (2/5)(5)\\right] = -(5)(2+2) + (5)(-2-2) = -20 - 20 = -40 < 0$<br>
Para <strong>maximizaciГіn</strong> queremos $|B| > 0$. Como $|B| < 0 \\Rightarrow$ son <strong>mГ­nimos</strong>.<br><br>

<strong>Puntos $(\\pm\\sqrt{5/3}, \\mp\\sqrt{5/3})$, $\\lambda = 2/3$:</strong> $g_x = 4x + y = 3x$, $g_y = x + 4y = -3x$.<br>
$\\mathcal{L}_{xx} = 2 - 8/3 = -2/3$, $\\mathcal{L}_{xy} = -2/3$.<br>
$|B| = +40 > 0 \\Rightarrow$ <strong>mГЎximos</strong>.
<div class="result-box">MГЎximos en $(\\sqrt{5/3}, -\\sqrt{5/3})$ y simГ©trico. MГ­nimos en $(\\pm 1, \\pm 1)$.</div>
</div>`
  }
],

