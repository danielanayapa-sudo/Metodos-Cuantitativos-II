        <div class="cat-num">CapГ­tulo II вЂ” 03</div>
        <div class="cat-title">Funciones multivariable</div>
        <div class="cat-desc">Derivadas parciales, homogeneidad, homoteticidad, derivaciГіn implГ­cita.</div>
        <div class="cat-meta">2.0 вЂ” 3.5 pts</div>
      </div>
      <div class="cat-card" data-cat="uncon">
        <div class="cat-num">CapГ­tulo III вЂ” 04</div>
        <div class="cat-title">OptimizaciГіn sin restricciones</div>
        <div class="cat-desc">Condiciones de primer y segundo orden, Hessiana, teorema de la envolvente.</div>
        <div class="cat-meta">2.5 вЂ” 3.0 pts</div>
      </div>
      <div class="cat-card" data-cat="eq">
        <div class="cat-num">CapГ­tulo IV вЂ” 05</div>
        <div class="cat-title">OptimizaciГіn con restricciГіn de igualdad</div>
        <div class="cat-desc">Lagrangiano, Hessiana Orlada, interpretaciГіn del multiplicador.</div>
        <div class="cat-meta">3.0 вЂ” 3.5 pts</div>
      </div>
      <div class="cat-card" data-cat="ineq">
        <div class="cat-num">CapГ­tulo V вЂ” 06</div>
        <div class="cat-title">OptimizaciГіn con restricciГіn de desigualdad</div>
        <div class="cat-desc">Kuhn-Tucker, casos binding / non-binding, teorema de la envolvente.</div>
        <div class="cat-meta">2.5 вЂ” 3.0 pts</div>
      </div>
    </div>
  </section>

  <div class="control-bar" id="controlBar">
    <div>
      <div class="control-label" id="ctrlLabel">вЂ”</div>
      <div class="control-title" id="ctrlTitle">вЂ”</div>
    </div>
    <button class="btn btn-accent" id="newBtn">в†» Nuevo ejercicio</button>
    <button class="btn" id="closeBtn">вњ• Cerrar</button>
  </div>

  <div class="exercise-wrap" id="exWrap">
    <div class="exam-header">
      <div class="exam-header-top">
        <span>Quantitative Methods II вЂ” 2025/26</span>
        <span id="examStamp">Practice set</span>
      </div>
      <h2 id="examTitle">вЂ”</h2>
    </div>
    <div class="exercise-body" id="exBody"></div>
  </div>

  <div class="footer-note">
    <div class="ornament">вќ§  вќ¦  вќ§</div>
    Banco curado a partir de exГЎmenes reales 2022-2025. Cada ejercicio viene con soluciГіn completa paso a paso.<br>
    <em>Pulsa В«Nuevo ejercicioВ» tantas veces como quieras вЂ” los ejercicios se rotan al azar dentro de cada categorГ­a.</em>
  </div>

</div>

<script>
// ============================================================
// BANCO DE EJERCICIOS вЂ” MГ©todos Cuantitativos II
// ============================================================

const EXERCISES = {

// =============================================
// SISTEMAS DE ECUACIONES CON PARГЃMETROS
// =============================================
systems: [
  {
    title: "Sistema 3Г—3 con parГЎmetro ОІ",
    points: "3 points",
    statement: `Considere el siguiente sistema de ecuaciones, para todo $\\beta \\in \\mathbb{R}$:
    <p>$$\\begin{cases} x + \\beta y + z = 1 \\\\ \\beta x + y + z = \\beta \\\\ x + y + \\beta z = \\beta^2 \\end{cases}$$</p>`,
    parts: [
      {text: "Escriba el sistema en forma matricial y explique sus componentes.", pts: "0.5 pts"},
      {text: "Discuta el sistema en tГ©rminos de su consistencia aplicando el teorema de RouchГ©-Frobenius.", pts: "1.5 pts"},
      {text: "Encuentre, si existe, el conjunto soluciГіn para cada caso.", pts: "1.0 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” Forma matricial</h4>
$$A X = B: \\quad \\begin{pmatrix} 1 & \\beta & 1 \\\\ \\beta & 1 & 1 \\\\ 1 & 1 & \\beta \\end{pmatrix} \\begin{pmatrix} x \\\\ y \\\\ z \\end{pmatrix} = \\begin{pmatrix} 1 \\\\ \\beta \\\\ \\beta^2 \\end{pmatrix}$$
donde $A$ es la matriz de coeficientes, $X$ la columna de incГіgnitas y $B$ el vector de tГ©rminos independientes.
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” DiscusiГіn</h4>
Calculamos $|A|$ desarrollando:
$$|A| = 1(\\beta - 1) - \\beta(\\beta^2 - 1) + 1(\\beta - 1) = 2(\\beta-1) - \\beta(\\beta-1)(\\beta+1)$$
$$= (\\beta-1)[2 - \\beta(\\beta+1)] = (\\beta-1)(-\\beta^2 - \\beta + 2) = -(\\beta-1)(\\beta-1)(\\beta+2) = -(\\beta-1)^2(\\beta+2)$$
<div class="result-box">$|A| = 0 \\iff \\beta = 1$ o $\\beta = -2$</div>
<strong>Caso 1:</strong> $\\beta \\notin \\{1, -2\\} \\Rightarrow$ rk($A$) = rk($A|B$) = 3 = $n$. <em>Sistema compatible determinado</em> (soluciГіn Гєnica).<br><br>
<strong>Caso 2:</strong> $\\beta = 1 \\Rightarrow$ todas las filas de $A$ quedan iguales a $(1,1,1)$. El sistema se reduce a $x+y+z=1$: rk($A$) = rk($A|B$) = 1 $<$ 3. <em>Sistema compatible indeterminado</em> con 2 parГЎmetros.<br><br>
<strong>Caso 3:</strong> $\\beta = -2$. Escalonando:
$$(A|B) \\sim \\begin{pmatrix} 1 & -2 & 1 & | & 1 \\\\ 0 & -3 & 3 & | & -3 \\\\ 0 & 0 & 0 & | & 6 \\end{pmatrix}$$
rk($A$) = 2 $\\neq$ rk($A|B$) = 3. <em>Sistema incompatible</em>.
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” Soluciones</h4>
<strong>Caso 1</strong> (Cramer). Tras calcular, por ejemplo para general $\\beta$:
$$x = \\frac{-(\\beta+1)}{\\beta+2}, \\quad y = \\frac{1}{\\beta+2}, \\quad z = \\frac{(\\beta+1)^2}{\\beta+2}$$
<strong>Caso 2</strong> ($\\beta=1$). Con $y=\\alpha$, $z=\\mu$:
$$X = \\begin{pmatrix} 1-\\alpha-\\mu \\\\ \\alpha \\\\ \\mu \\end{pmatrix}, \\;\\; \\forall \\alpha, \\mu \\in \\mathbb{R}$$
<strong>Caso 3</strong> ($\\beta=-2$): No existe soluciГіn.
</div>`
  },

  {
    title: "Sistema 4Г—4 con parГЎmetros a, b",
    points: "4 points",
    statement: `Dado el siguiente sistema de ecuaciones:
    <p>$$\\begin{cases} x + y + z + t = 4 \\\\ x + 2y + 3z + 4t = 10 \\\\ 2x + 3y + az + 5t = b \\\\ x + y + z + at = 4 \\end{cases}$$</p>`,
    parts: [
      {text: "Calcule una forma escalonada del sistema.", pts: "1.0 pts"},
      {text: "Discuta y resuelva el sistema en funciГіn de los parГЎmetros $a$ y $b$.", pts: "2.5 pts"},
      {text: "ВїCuГЎl es la soluciГіn si $a = 2$ y $b = 14$? (Sustituya en la discusiГіn).", pts: "0.5 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” Escalonamiento</h4>
$$(A|B) = \\begin{pmatrix} 1 & 1 & 1 & 1 & | & 4 \\\\ 1 & 2 & 3 & 4 & | & 10 \\\\ 2 & 3 & a & 5 & | & b \\\\ 1 & 1 & 1 & a & | & 4 \\end{pmatrix}$$
$R_2' = R_2 - R_1$, $R_3' = R_3 - 2R_1$, $R_4' = R_4 - R_1$:
$$\\sim \\begin{pmatrix} 1 & 1 & 1 & 1 & | & 4 \\\\ 0 & 1 & 2 & 3 & | & 6 \\\\ 0 & 1 & a-2 & 3 & | & b-8 \\\\ 0 & 0 & 0 & a-1 & | & 0 \\end{pmatrix}$$
$R_3'' = R_3' - R_2'$:
$$\\sim \\begin{pmatrix} 1 & 1 & 1 & 1 & | & 4 \\\\ 0 & 1 & 2 & 3 & | & 6 \\\\ 0 & 0 & a-4 & 0 & | & b-14 \\\\ 0 & 0 & 0 & a-1 & | & 0 \\end{pmatrix}$$
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” DiscusiГіn</h4>
Valores crГ­ticos: $a=1$ y $a=4$.<br><br>

<strong>Caso 1:</strong> $a \\notin \\{1, 4\\}$, $\\forall b \\in \\mathbb{R}$. rk($A$) = rk($A|B$) = 4 = $n$ $\\Rightarrow$ <em>soluciГіn Гєnica</em>.<br>
De $R_4$: $t=0$. De $R_3$: $z = \\frac{b-14}{a-4}$. Sustituyendo hacia arriba obtenemos $x, y$.<br><br>

<strong>Caso 2:</strong> $a = 4$.<br>
вЂў Si $b = 14$: $R_3$ se anula, rk($A$) = rk($A|B$) = 3 $<$ 4 $\\Rightarrow$ <em>S.C. indeterminado</em> (1 parГЎmetro).<br>
вЂў Si $b \\neq 14$: rk($A$) = 3 $\\neq$ rk($A|B$) = 4 $\\Rightarrow$ <em>incompatible</em>.<br><br>

<strong>Caso 3:</strong> $a = 1$.<br>
вЂў Si $b = 14$: $R_3$ da $-3z = 0 \\Rightarrow z=0$; $R_4$ se anula. rk = 3 $\\Rightarrow$ <em>S.C.I.</em><br>
вЂў Si $b \\neq 14$: <em>incompatible</em>.
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” $a=2$, $b=14$</h4>
Estamos en Caso 1. De $R_4$: $t=0$. De $R_3$: $(2-4)z = 14-14 \\Rightarrow z = 0$.<br>
De $R_2$: $y = 6$. De $R_1$: $x = 4 - 6 = -2$.
<div class="result-box">$X = (-2, 6, 0, 0)^T$</div>
</div>`
  },

  {
    title: "Sistema 3Г—3 homogГ©neo con parГЎmetro О±",
    points: "3.5 points",
    statement: `Discuta y resuelva, $\\forall \\alpha \\in \\mathbb{R}$, el siguiente sistema:
    <p>$$\\begin{cases} \\alpha x + y + z = 1 \\\\ x + \\alpha y + z = \\alpha \\\\ x + y + \\alpha z = \\alpha^2 \\end{cases}$$</p>`,
    parts: [
      {text: "Obtenga la forma matricial y calcule $|A|$ en funciГіn de $\\alpha$.", pts: "1.0 pts"},
      {text: "Discuta la consistencia del sistema para los valores crГ­ticos del parГЎmetro.", pts: "1.5 pts"},
      {text: "Resuelva el sistema en cada caso.", pts: "1.0 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a)</h4>
$$A = \\begin{pmatrix} \\alpha & 1 & 1 \\\\ 1 & \\alpha & 1 \\\\ 1 & 1 & \\alpha \\end{pmatrix}, \\quad B = \\begin{pmatrix} 1 \\\\ \\alpha \\\\ \\alpha^2 \\end{pmatrix}$$
$$|A| = \\alpha(\\alpha^2-1) - 1(\\alpha-1) + 1(1-\\alpha) = (\\alpha-1)[\\alpha(\\alpha+1) - 2] = (\\alpha-1)(\\alpha+2)(\\alpha-1) = (\\alpha-1)^2(\\alpha+2)$$
AnulaciГіn: $\\alpha = 1$ o $\\alpha = -2$.
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” DiscusiГіn</h4>
<strong>Caso 1:</strong> $\\alpha \\notin \\{1,-2\\}$: rk($A$) = 3 = rk($A|B$) $\\Rightarrow$ <em>soluciГіn Гєnica</em>.<br><br>

<strong>Caso 2:</strong> $\\alpha = 1$. $A$ se convierte en una matriz con todas sus filas iguales a $(1,1,1)$, y $B = (1,1,1)^T$. rk($A$) = 1 = rk($A|B$) $<$ 3 $\\Rightarrow$ <em>S.C. indeterminado</em> con 2 parГЎmetros.<br><br>

<strong>Caso 3:</strong> $\\alpha = -2$. Escalonando $(A|B)$:
$$\\sim \\begin{pmatrix} 1 & 1 & -2 & | & 4 \\\\ 0 & -3 & 3 & | & -3 \\\\ 0 & 0 & 0 & | & 3 \\end{pmatrix}$$
rk($A$) = 2 $\\neq$ 3 = rk($A|B$) $\\Rightarrow$ <em>incompatible</em>.
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” Soluciones</h4>
<strong>Caso 1 вЂ” Cramer:</strong>
$$x = -\\frac{\\alpha+1}{\\alpha+2}, \\quad y = \\frac{1}{\\alpha+2}, \\quad z = \\frac{(\\alpha+1)^2}{\\alpha+2}$$
<strong>Caso 2 ($\\alpha=1$):</strong> $y=\\alpha_1, z=\\alpha_2$, $x = 1 - \\alpha_1 - \\alpha_2$.<br>
<strong>Caso 3:</strong> no hay soluciГіn.
</div>`
  }
],

