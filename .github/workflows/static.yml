  {
    title: "Monopolio con parГЎmetros a, b, c y envolvente",
    points: "3 points",
    statement: `Considere un monopolista en dos mercados con demandas inversas $p_1 = a - q_1$, $p_2 = b - 2q_2$, donde $a, b \\in [22, 26]$. La funciГіn de costes totales es $C(q_1, q_2) = 3q_1^2 + cq_1 q_2 + 3q_2^2$, con $c \\in [2, 4]$.`,
    parts: [
