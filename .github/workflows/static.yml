// OPTIMIZACIГ“N SIN RESTRICCIONES
// =============================================
uncon: [
  {
    title: "OptimizaciГіn con parГЎmetro y envolvente",
    points: "3 points",
    statement: `Considere la funciГіn:
    <p>$$f(x, y) = 2x^3 + 6y^2 - 54x - by + 12$$</p>
    donde $b > 0$.`,
    parts: [
      {text: "Escriba las condiciones de primer orden y encuentre los puntos crГ­ticos.", pts: "1.0 pts"},
      {text: "Calcule la Hessiana en cada punto crГ­tico y clasifique (mГЎximo local, mГ­nimo local o punto de silla).", pts: "1.0 pts"},
      {text: "Sea $(x^*, y^*)$ el punto crГ­tico con $x^* > 0$ y sea $f^*(b) = f(x^*, y^*)$. Verifique el Teorema de la Envolvente.", pts: "1.0 pts"}
    ],
    solution: `
<div class="sol-step"><h4>Apartado (a) вЂ” FOC</h4>
$$f_x = 6x^2 - 54 = 0 \\Rightarrow x^2 = 9 \\Rightarrow x = \\pm 3$$
$$f_y = 12y - b = 0 \\Rightarrow y = \\frac{b}{12}$$
<div class="result-box">Puntos crГ­ticos: $P_1 = (3, b/12)$, $P_2 = (-3, b/12)$</div>
</div>

<div class="sol-step"><h4>Apartado (b) вЂ” Hessiana</h4>
$$f_{xx} = 12x, \\quad f_{yy} = 12, \\quad f_{xy} = 0$$
$$H(x,y) = \\begin{pmatrix} 12x & 0 \\\\ 0 & 12 \\end{pmatrix}, \\quad |H| = 144x$$
<strong>En $P_1 = (3, b/12)$:</strong> $|H| = 432 > 0$, $f_{xx} = 36 > 0 \\Rightarrow$ <strong>mГ­nimo local</strong>.<br>
<strong>En $P_2 = (-3, b/12)$:</strong> $|H| = -432 < 0 \\Rightarrow$ <strong>punto de silla</strong>.
</div>

<div class="sol-step"><h4>Apartado (c) вЂ” Teorema de la Envolvente</h4>
$(x^*, y^*) = (3, b/12)$.<br><br>

<strong>MГ©todo 1 (directo):</strong>
$$f^*(b) = 2(27) + 6\\left(\\frac{b}{12}\\right)^2 - 54(3) - b\\left(\\frac{b}{12}\\right) + 12$$
$$= 54 + \\frac{b^2}{24} - 162 - \\frac{b^2}{12} + 12 = -\\frac{b^2}{24} - 96$$
$$\\frac{df^*}{db} = -\\frac{b}{12}$$
<strong>MГ©todo 2 (envolvente):</strong>
$$\\frac{\\partial f}{\\partial b} = -y \\Big|_{(x^*,y^*)} = -\\frac{b}{12}$$
<div class="result-box">Ambos coinciden: $\\dfrac{df^*}{db} = -\\dfrac{b}{12}$ вњ“ El teorema se verifica.</div>
</div>`
